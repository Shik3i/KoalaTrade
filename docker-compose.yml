services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    ports:
      - "127.0.0.1:18080:8080"
    volumes:
      - data:/data
    environment:
      - DB_PATH=/data/koalatrade.db
      - PORT=8080
    env_file:
      - path: .env
        required: false
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    ports:
      - "3000:8080"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  data:
