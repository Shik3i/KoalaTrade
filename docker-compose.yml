services:
  koalatrade:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "127.0.0.1:18080:8080"
    volumes:
      - data:/data
    environment:
      - APP_ENV=production
      - DB_PATH=/data/koalatrade.db
      - PORT=8080
    env_file:
      - path: .env
        required: false
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8080/healthz"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 10s

volumes:
  data:
