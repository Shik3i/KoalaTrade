name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.26.x"
          cache-dependency-path: backend/go.sum

      - name: Test backend
        working-directory: backend
        run: go test ./...

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Check frontend
        working-directory: frontend
        run: npm run check

      - name: Build frontend
        working-directory: frontend
        run: npm run build

      - name: Build backend image
        run: docker build -f Dockerfile.backend -t koalatrade-backend:ci .

      - name: Build frontend image
        run: docker build -f Dockerfile.frontend -t koalatrade-frontend:ci .
